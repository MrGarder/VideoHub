<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>VideoHub — Главная</title>

  <style>
    :root{
      --bg1: #1e1e2f;
      --accent: #6b5cff;
      --text: #fff;
      --card-bg: rgba(255,255,255,0.06);
      --glass: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.12);
      --voice-cyan: #6a00ff; 
      --voice-glow: rgba(255, 0, 217, 0.4);
      --danger: #ff4e4e;
    }

    /* --- ИСПРАВЛЕННЫЙ ПРЕЛОАДЕР --- */
    #preloader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #11111a 0%, #1b1630 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 10000; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .loader-content { text-align: center; }
    
    /* Круглое место под твое фото */
    .loader-photo { 
      width: 120px; height: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid var(--accent);
      box-shadow: 0 0 25px var(--accent);
      object-fit: cover;
      display: block;
      margin-left: auto;
      margin-right: auto;
      animation: photoPulse 2s infinite ease-in-out;
    }
    
    .loader-text {
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: -1px; margin-bottom: 25px;
    }
    .loader-text span { color: var(--accent); }
    .loader-track {
      width: 220px; height: 3px; background: rgba(255,255,255,0.05);
      border-radius: 10px; overflow: hidden; margin: 0 auto;
    }
    .loader-bar {
      width: 0%; height: 100%; background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
      animation: loadAnim 2.5s infinite ease-in-out;
    }
    @keyframes photoPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--accent)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 30px var(--accent)); }
    }
    @keyframes loadAnim {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
    /* ------------------------------ */

    html,body{
      height:100%; margin:0; font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #11111a 0%, #1b1630 100%);
      color: var(--text); overflow-x: hidden;
    }
    .bg-glow { position: fixed; left:-200px; top:-120px; width:700px; height:700px;
      background: radial-gradient(circle at 30% 30%, #5a4bff33 0%, transparent 40%);
      filter: blur(110px); z-index:0; pointer-events:none; }
    
    .topbar {
      position: sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:12px 20px; background: var(--glass); border-bottom:1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .left-group, .right-group { display:flex; align-items:center; gap:12px; }
    .logo { font-weight:700; font-size:22px; cursor: pointer; }
    .logo span { color: var(--accent); }

    .search-box { flex: 1; max-width: 500px; position: relative; display: flex; align-items: center; }
    .search-box input { 
        width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); 
        padding: 10px 60px 10px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s;
    }
    .search-box input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }
    
    .voice-btn {
        position: absolute; right: 5px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
        color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s;
        padding: 0; display: flex; align-items: center; justify-content: center;
        border-radius: 20px; width: 50px; height: 32px; overflow: hidden;
    }
    .voice-btn:hover { color: var(--voice-cyan); border-color: var(--voice-cyan); background: rgba(0, 242, 255, 0.05); }

    .mic-icon { font-size: 16px; transition: 0.3s; }
    
    .voice-waves {
        position: absolute; width: 100%; height: 100%;
        display: none; align-items: center; justify-content: center; gap: 3px;
    }
    .wave {
        width: 3px; height: 4px; background: var(--voice-cyan);
        border-radius: 2px; transition: height 0.1s ease;
        box-shadow: 0 0 10px var(--voice-glow);
    }

    .voice-btn.listening { 
        border-color: var(--voice-cyan); 
        background: rgba(0, 242, 255, 0.1); 
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
    }
    .voice-btn.listening .mic-icon { display: none; }
    .voice-btn.listening .voice-waves { display: flex; }
    
    .icon-btn { background: transparent; border: 1px solid rgba(255,255,255,0.06);
      padding:8px 10px; border-radius:10px; cursor:pointer; color:var(--text); transition:.18s; }
    .upload-btn { background: linear-gradient(135deg, var(--accent), #5143ff); border:none;
      padding:8px 14px; border-radius:12px; color:#fff; cursor:pointer; transition:.18s; }

    .sidebar{ position:fixed; left:-240px; top:70px; width:220px; height:calc(100% - 70px);
      padding-top:16px; background: rgba(255,255,255,0.02); border-right:1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(12px); z-index:25; transition: .35s ease; }
    .sidebar.open{ left:0; }
    .sidebar a{ display:block; padding:12px 18px; color:var(--text); text-decoration:none; transition:.14s;}
    .sidebar a:hover { background: rgba(255,255,255,0.05); }
    
    main.videos{ padding:34px; display:grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:22px; position:relative; z-index:5; transition: 0.35s ease; }

    .video-card{ background: var(--card-bg); border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.04); transition: .25s; cursor: pointer; }
    .video-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); border-color: var(--accent); }
    
    .thumb-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; position: relative; }
    .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 2; transition: opacity 0.3s ease; }
    .thumb-wrapper video { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.3s ease; }

    .video-info { padding: 15px; }
    .video-info h4 { margin: 0 0 8px 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-info p { margin: 0; font-size: 13px; color: #aaa; }

    .user-profile { position: relative; display: flex; align-items: center; gap: 10px; }
    .user-name { font-weight: 500; font-size: 14px; color: #8e82ff; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
    .user-name:hover { background: rgba(255,255,255,0.05); }
    
    .dropdown-content {
      display: none; position: absolute; top: 40px; right: 0;
      background: #1a1a24; border: 1px solid var(--accent);
      border-radius: 12px; min-width: 170px; z-index: 110;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden;
    }
    .dropdown-content button { width: 100%; padding: 12px 15px; background: none; border: none; color: #fff; text-align: left; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .dropdown-content button:hover { background: rgba(107, 92, 255, 0.2); }

    .notif-container { position: relative; display: flex; align-items: center; }
    .notif-badge { 
      position: absolute; top: -5px; right: -5px; background: var(--danger); 
      color: white; font-size: 9px; padding: 2px 5px; border-radius: 50%; display: none; 
    }
    .notif-dropdown {
      display: none; position: absolute; top: 45px; right: 0;
      background: #1a1a24; border: 1px solid var(--accent);
      border-radius: 12px; width: 280px; z-index: 115;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6); overflow: hidden;
    }
    .notif-header { padding: 10px 15px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 13px; color: var(--accent); }
    .notif-list { max-height: 350px; overflow-y: auto; }
    .notif-item { 
      padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); 
      font-size: 12px; cursor: pointer; transition: 0.2s; 
    }
    .notif-item:hover { background: rgba(255,255,255,0.05); }
    .notif-item b { color: var(--accent); }
    .notif-empty { padding: 20px; text-align: center; color: #666; font-size: 12px; }

    #miniPlayer {
      position: fixed; bottom: 20px; right: 20px; width: 300px;
      background: rgba(26, 26, 36, 0.9); border: 1px solid var(--accent);
      border-radius: 16px; overflow: hidden; z-index: 1000;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: none;
      backdrop-filter: blur(10px); cursor: pointer;
      transition: transform 0.3s ease;
      touch-action: none;
    }
    #miniPlayer:hover { transform: translateY(-5px); }
    
    .mini-video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; cursor: move; }
    #miniVideo { width: 100%; height: 100%; display: block; pointer-events: none; }
    
    .mini-controls {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center;
      justify-content: center; gap: 15px; opacity: 0; transition: 0.3s; z-index: 2;
    }
    .mini-video-container:hover .mini-controls { opacity: 1; }
    
    .ctrl-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 50%; width: 36px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: 0.2s; backdrop-filter: blur(4px);
    }
    .ctrl-btn:hover { background: var(--accent); transform: scale(1.1); }

    .mini-info { padding: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
    .mini-info span { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: #eee; }
    .mini-close { background: rgba(255,107,107,0.1); border: none; color: #ff6b6b; cursor: pointer; font-size: 18px; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .mini-close:hover { background: #ff6b6b; color: white; }
  </style>
</head>
<body>

  <div id="preloader">
    <div class="loader-content">
      <img class="loader-photo" src="uploads/IMG_5231.PNG" alt="Logo">
      <div class="loader-text">Video<span>Hub</span></div>
      <div class="loader-track">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <div class="bg-glow"></div>

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" id="menuBtn">☰</button>
      <div class="logo" onclick="location.href='index.html'">Video<span>Hub</span></div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск видео или автора..." oninput="filterVideos()">
        <button class="voice-btn" id="voiceSearchBtn" title="Голосовой поиск">
            <span class="mic-icon">🎤</span>
            <div class="voice-waves" id="voiceWaves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
        </button>
    </div>

    <div class="right-group" id="authSection">
      <button class="icon-btn" onclick="location.href='auth.html'">🔐 Войти</button>
      <button class="upload-btn" onclick="alert('Войдите, чтобы загружать видео')">⬆ Загрузить</button>
    </div>
  </header>

  <aside id="sidebar" class="sidebar">
    <a href="index.html">🏠 Главная</a>
    <a href="profile.html">👤 Мой Профиль</a>
    <a href="history.html">📜 История</a>
    <a href="upload.html">⬆ Загрузить видео</a>
    <a href="popular.html">🔥 Популярное</a>
    <a href="assistant.html">🗂 Список обновлений</a>
  </aside>

  <main id="videoList" class="videos"></main>

  <div id="miniPlayer" onclick="goToVideo()">
      <div class="mini-video-container" id="miniDraggable">
          <video id="miniVideo" autoplay loop></video>
          <div class="mini-controls">
              <button class="ctrl-btn" onclick="prevVideo(event)" title="Назад">◀</button>
              <button class="ctrl-btn" id="miniPauseBtn" onclick="togglePause(event)" title="Пауза/Пуск">⏸</button>
              <button class="ctrl-btn" onclick="nextVideo(event)" title="Вперед">▶</button>
          </div>
      </div>
      <div class="mini-info">
          <span id="miniTitle">Название видео</span>
          <button class="mini-close" onclick="closeMiniPlayer(event)">×</button>
      </div>
  </div>

  <script>
    const API_URL = "https://videohub-c48i.onrender.com";
    let allVideosData = [];
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    menuBtn.onclick = () => sidebar.classList.toggle("open");

    // ЛОГИКА ПРЕЛОАДЕРА (СКРЫВАЕТ ПРИ ОБНОВЛЕНИИ)
    (function() {
        const preloader = document.getElementById('preloader');
        if (sessionStorage.getItem('pageLoaded')) {
            preloader.style.display = 'none';
        } else {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => { 
                        preloader.remove(); 
                        sessionStorage.setItem('pageLoaded', 'true');
                    }, 600);
                }, 1500);
            });
        }
    })();

    function filterVideos() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = allVideosData.filter(v => 
            v.title.toLowerCase().includes(query) || 
            (v.author_name && v.author_name.toLowerCase().includes(query))
        );
        renderVideos(filtered);
    }

    async function loadNotifications() {
        const user = localStorage.getItem('currentUser');
        if (!user) return;
        try {
            const res = await fetch(`${API_URL}/notifications/${user}`);
            const notes = await res.json();
            const badge = document.getElementById('notifBadge');
            const list = document.getElementById('notifList');
            const unreadCount = notes.filter(n => !n.read).length;
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.style.display = 'block';
            } else { badge.style.display = 'none'; }
            if (notes.length === 0) {
                list.innerHTML = '<div class="notif-empty">Пока нет уведомлений</div>';
                return;
            }
            list.innerHTML = notes.map(n => `
                <div class="notif-item" onclick="location.href='watch.html?v=${n.video_id}'">
                    <b>@${n.from_user}</b> ${n.text}
                </div>
            `).join('');
        } catch (err) { console.error("Ошибка уведомлений", err); }
    }

    function toggleNotifs() {
        const menu = document.getElementById('notifMenu');
        const isVisible = menu.style.display === 'block';
        menu.style.display = isVisible ? 'none' : 'block';
        if (!isVisible) {
            const user = localStorage.getItem('currentUser');
            fetch(`${API_URL}/notifications/read`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user })
            }).then(() => {
                document.getElementById('notifBadge').style.display = 'none';
            });
        }
    }

    const voiceBtn = document.getElementById('voiceSearchBtn');
    const searchInput = document.getElementById('searchInput');
    const waveElements = document.querySelectorAll('.wave');
    let audioCtx, analyser, dataArray, animationId, stream;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = true;
        voiceBtn.onclick = () => {
            if (voiceBtn.classList.contains('listening')) recognition.stop();
            else recognition.start();
        };
        recognition.onstart = async () => {
            voiceBtn.classList.add('listening');
            searchInput.placeholder = "Слушаю...";
            searchInput.value = "";
            await startVisualizer();
        };
        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript;
            if(transcript.endsWith('.')) transcript = transcript.slice(0, -1);
            searchInput.value = transcript;
            if (event.results[0].isFinal) { filterVideos(); stopVisualizer(); }
        };
        recognition.onspeechend = () => { recognition.stop(); stopVisualizer(); };
        recognition.onerror = () => { stopVisualizer(); };
        async function startVisualizer() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 32; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch (err) { console.error("Ошибка микрофона:", err); }
        }
        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            waveElements.forEach((wave, i) => {
                const value = dataArray[i * 2] || 0;
                const height = Math.max(4, (value / 255) * 26); 
                wave.style.height = `${height}px`;
                wave.style.opacity = 0.5 + (value / 255);
            });
        }
        function stopVisualizer() {
            voiceBtn.classList.remove('listening');
            searchInput.placeholder = "Поиск видео или автора...";
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (audioCtx) audioCtx.close();
            waveElements.forEach(wave => { wave.style.height = '4px'; wave.style.opacity = '1'; });
        }
    } else { voiceBtn.style.display = 'none'; }

    function renderVideos(videos) {
        const videoList = document.getElementById("videoList");
        if (videos.length === 0) {
            videoList.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #888; padding: 40px;'>Ничего не найдено...</p>";
            return;
        }
        videoList.innerHTML = videos.map(v => {
          let mediaHtml = v.thumbnail_url 
            ? `<img src="${v.thumbnail_url}" alt="thumb"><video src="${v.url}" muted loop preload="none"></video>`
            : `<video src="${v.url}#t=0.1" muted loop preload="metadata" style="opacity:1; z-index:2;"></video>`;
          
          return `
            <div class="video-card" onclick="location.href='watch.html?v=${v._id}'" onmouseenter="playPreview(this)" onmouseleave="stopPreview(this)">
              <div class="thumb-wrapper">${mediaHtml}</div>
              <div class="video-info">
                <h4>${v.title}</h4>
                <p>Автор: <b>@${v.author_name || 'Аноним'}</b></p>
                <p style="font-size:12px; margin-top:5px; opacity: 0.7;">👁 ${v.views || 0} просмотров</p>
              </div>
            </div>
          `;
        }).join('');
    }

    function playPreview(card) {
        const video = card.querySelector('video');
        const img = card.querySelector('img');
        if (video) {
            video.style.opacity = "1";
            if (img) img.style.opacity = "0";
            video.play().catch(() => {});
        }
    }

    function stopPreview(card) {
        const video = card.querySelector('video');
        const img = card.querySelector('img');
        if (video) {
            video.pause();
            video.currentTime = 0.1;
            video.style.opacity = "0";
            if (img) img.style.opacity = "1";
        }
    }

    function checkMiniPlayer() {
        const data = localStorage.getItem('lastWatched');
        if (data) {
            const videoData = JSON.parse(data);
            const mini = document.getElementById('miniPlayer');
            const v = document.getElementById('miniVideo');
            const t = document.getElementById('miniTitle');
            mini.style.display = 'block';
            t.innerText = videoData.title;
            v.src = videoData.url;
            v.currentTime = videoData.time || 0;
            v.play().catch(() => { document.getElementById('miniPauseBtn').innerText = '▶'; });
        }
    }

    function togglePause(e) {
        e.stopPropagation();
        const v = document.getElementById('miniVideo');
        const btn = document.getElementById('miniPauseBtn');
        if (v.paused) { v.play(); btn.innerText = '⏸'; } 
        else { v.pause(); btn.innerText = '▶'; }
    }

    function nextVideo(e) { e.stopPropagation(); changeVideo(1); }
    function prevVideo(e) { e.stopPropagation(); changeVideo(-1); }

    function changeVideo(direction) {
        const data = localStorage.getItem('lastWatched');
        if (!data || allVideosData.length === 0) return;
        const current = JSON.parse(data);
        const currentIndex = allVideosData.findIndex(v => String(v._id) === String(current.id));
        let nextIndex = currentIndex + direction;
        if (nextIndex >= allVideosData.length) nextIndex = 0;
        if (nextIndex < 0) nextIndex = allVideosData.length - 1;
        const nextVid = allVideosData[nextIndex];
        const newData = { id: nextVid._id, title: nextVid.title, url: nextVid.url, time: 0 };
        localStorage.setItem('lastWatched', JSON.stringify(newData));
        const v = document.getElementById('miniVideo');
        document.getElementById('miniTitle').innerText = nextVid.title;
        v.src = nextVid.url;
        v.play();
        document.getElementById('miniPauseBtn').innerText = '⏸';
    }

    function goToVideo() {
        const data = localStorage.getItem('lastWatched');
        if (data) {
            const video = JSON.parse(data);
            const v = document.getElementById('miniVideo');
            video.time = v.currentTime;
            localStorage.setItem('lastWatched', JSON.stringify(video));
            location.href = `watch.html?v=${video.id}`;
        }
    }

    function closeMiniPlayer(e) {
        e.stopPropagation();
        localStorage.removeItem('lastWatched');
        document.getElementById('miniPlayer').style.display = 'none';
        document.getElementById('miniVideo').pause();
    }

    const dragPlayer = document.getElementById('miniPlayer');
    const dragHandle = document.getElementById('miniDraggable');
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;

    function startDrag(e) {
        isDragging = true;
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        const rect = dragPlayer.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        dragPlayer.style.transition = 'none';
        dragPlayer.style.bottom = 'auto';
        dragPlayer.style.right = 'auto';
    }

    function moveDrag(e) {
        if (!isDragging) return;
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        const dx = clientX - startX;
        const dy = clientY - startY;
        dragPlayer.style.left = (initialLeft + dx) + 'px';
        dragPlayer.style.top = (initialTop + dy) + 'px';
    }

    function stopDrag() {
        if (isDragging) {
            isDragging = false;
            dragPlayer.style.transition = 'transform 0.3s ease';
        }
    }

    dragHandle.addEventListener('mousedown', startDrag);
    dragHandle.addEventListener('touchstart', startDrag, {passive: true});
    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('touchmove', moveDrag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function checkAuth() {
      const username = localStorage.getItem('currentUser');
      const authSection = document.getElementById("authSection");
      if (username) {
        let adminBtn = (username === 'MrGarder') ? `<button onclick="location.href='admin.html'" style="border:1px solid gold; color:gold">⚙ Админка</button>` : '';
        authSection.innerHTML = `
          <div class="notif-container">
            <button class="icon-btn" onclick="toggleNotifs()">🔔 <span id="notifBadge" class="notif-badge">0</span></button>
            <div id="notifMenu" class="notif-dropdown">
                <div class="notif-header">Уведомления</div>
                <div id="notifList" class="notif-list"></div>
            </div>
          </div>
          <div class="user-profile">
            <span class="user-name" onclick="toggleUserMenu()">@${username} ▼</span>
            <div id="userDropdown" class="dropdown-content">
                <button onclick="location.href='profile.html'">👤 Мой канал</button>
                <button onclick="location.href='history.html'">📜 История</button>
                ${adminBtn}
                <button onclick="logout()" style="color:#ff6b6b">🚪 Выйти</button>
            </div>
          </div>
          <button class="upload-btn" onclick="location.href='upload.html'">⬆ Загрузить</button>
        `;
        loadNotifications();
        setInterval(loadNotifications, 30000);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem('lastWatched');
      location.reload();
    }

    async function fetchVideos() {
      try {
        const res = await fetch(API_URL + '/videos');
        allVideosData = await res.json();
        renderVideos(allVideosData);
        checkMiniPlayer(); 
      } catch (e) {
        document.getElementById("videoList").innerHTML = "<p style='grid-column:1/-1; text-align:center; padding: 20px;'>Ошибка сервера.</p>";
      }
    }

    function toggleUserMenu() {
        const menu = document.getElementById("userDropdown");
        if(menu) menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }

    window.onclick = function(event) {
        if (!event.target.closest('.user-profile')) {
            const d = document.getElementById("userDropdown");
            if(d) d.style.display = "none";
        }
        if (!event.target.closest('.notif-container')) {
            const n = document.getElementById("notifMenu");
            if(n) n.style.display = "none";
        }
    }

    window.onload = () => { checkAuth(); fetchVideos(); };
  </script>
</body>
</html>
