<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>VideoHub — Авторизация</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .bg-decor {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #5a4bff40, #0000);
      filter: blur(120px);
      animation: move 12s infinite alternate ease-in-out;
    }
    @keyframes move {
      0% { transform: translate(-200px, -100px); }
      100% { transform: translate(200px, 150px); }
    }

    .auth-card {
      width: 420px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      animation: fadeIn 0.5s ease;
      color: #fff;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card h2 {
      margin-bottom: 25px;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
      transition: 0.3s;
      box-sizing: border-box;
    }

    .input:focus {
      border-color: #6b5cff;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 15px rgba(107, 92, 255, 0.2);
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6b5cff, #5143ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(80,70,255,0.4);
    }

    .switch {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
    .switch a {
      color: #8e82ff;
      text-decoration: none;
      cursor: pointer;
    }
    .switch a:hover { text-decoration: underline; }

    .divider {
        margin: 25px 0;
        display: flex;
        align-items: center;
        font-size: 12px;
        color: rgba(255,255,255,0.3);
    }
    .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.1);
        margin: 0 10px;
    }

    .social-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #googleBtn {
        display: flex;
        justify-content: center;
        width: 100%;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      box-sizing: border-box;
      font-size: 14px;
    }
    .social-btn:hover { background: rgba(255,255,255,0.12); }
    .social-btn img { width: 18px; }
  </style>
</head>
<body>

<div class="bg-decor"></div>

<div class="auth-card">
  <h2 id="title">Вход в VideoHub</h2>

  <div id="fields">
    <input id="loginInput" class="input" type="text" placeholder="Email или Логин">
    <input id="passInput" class="input" type="password" placeholder="Пароль">
  </div>

  <button class="btn-main" onclick="submitForm()">Продолжить</button>

  <div class="switch">
    <a id="switchLink" onclick="toggleMode()">Перейти к регистрации</a>
  </div>

  <div class="divider">ИЛИ</div>

  <div class="social-block">
    <div id="googleBtn"></div>
    <div class="social-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/VK_Compact_Logo_%282021-present%29.svg"> 
        Войти через VK
    </div>
  </div>
</div>

<script>
  let mode = "login";

  window.onload = function () {
      google.accounts.id.initialize({
          client_id: "897716797553-spvtnmo96h8mnn9tioa4t4ir1iqv60qh.apps.googleusercontent.com", 
          callback: handleGoogleResponse
      });
      
      google.accounts.id.renderButton(
          document.getElementById("googleBtn"),
          { 
              theme: "outline", 
              size: "large", 
              width: 350, 
              text: "continue_with",
              shape: "pill" 
          } 
      );
  }

  function parseJwt (token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  };

  async function handleGoogleResponse(response) {
      const userData = parseJwt(response.credential);
      
      localStorage.setItem('currentUser', userData.given_name);
      localStorage.setItem('userPic', userData.picture);

      try {
          const res = await fetch('/google-auth', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: response.credential })
          });
          window.location.href = "index.html";
      } catch (error) {
          window.location.href = "index.html";
      }
  }

  function toggleMode() {
    mode = (mode === "login") ? "register" : "login";
    const title = document.getElementById("title");
    const link = document.getElementById("switchLink");
    const fields = document.getElementById("fields");

    if (mode === "register") {
      title.textContent = "Регистрация";
      link.textContent = "Уже есть аккаунт? Войти";
      fields.innerHTML = `
        <input id="usernameInput" class="input" type="text" placeholder="Имя">
        <input id="emailInput" class="input" type="email" placeholder="Email">
        <input id="passInput" class="input" type="password" placeholder="Пароль">
      `;
    } else {
      title.textContent = "Вход в VideoHub";
      link.textContent = "Перейти к регистрации";
      fields.innerHTML = `
        <input id="loginInput" class="input" type="text" placeholder="Email или Логин">
        <input id="passInput" class="input" type="password" placeholder="Пароль">
      `;
    }
  }

  async function submitForm() {
    // Находим поля в зависимости от текущего режима
    const loginVal = mode === "login" 
      ? document.getElementById("loginInput").value 
      : document.getElementById("usernameInput").value;
    
    const passVal = document.getElementById("passInput").value;
    const emailVal = mode === "register" ? document.getElementById("emailInput").value : null;

    if (!loginVal || !passVal) {
        return alert("Заполните все поля!");
    }

    const endpoint = mode === "login" ? "/login" : "/register";
    const payload = mode === "login" 
      ? { username: loginVal, password: passVal }
      : { username: loginVal, email: emailVal, password: passVal };

    try {
        const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('currentUser', data.username || loginVal);
            alert(mode === "login" ? "С возвращением!" : "Регистрация успешна!");
            window.location.href = "index.html";
        } else {
            alert("Ошибка: " + (data.error || "Неверные данные"));
        }
    } catch (err) {
        console.error(err);
        alert("Сервер не отвечает. Проверь статус на Render!");
    }
  }
</script>
</body>
</html>
