<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>VideoHub — Панель Управления</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #0f0f1a;
      --glass: rgba(255,255,255,0.05);
      --accent: #6b5cff;
      --danger: #ff4e4e;
      --text: #fff;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1b1630);
      color: var(--text);
      min-height: 100vh;
      display: none; 
    }

    .admin-container {
      max-width: 1400px; /* Увеличил ширину для двух колонок */
      margin: 0 auto;
      padding: 30px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--glass);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .stats-card {
      background: rgba(107, 92, 255, 0.1);
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--accent);
    }

    /* СЕТКА ДЛЯ ДВУХ БЛОКОВ */
    .admin-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr; /* Видео чуть шире, юзеры уже */
      gap: 30px;
      align-items: start;
    }

    @media (max-width: 1000px) {
      .admin-grid { grid-template-columns: 1fr; } /* На мобилках в одну колонку */
    }

    .content-section {
      background: var(--glass);
      padding: 25px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      height: fit-content;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 20px;
      color: var(--accent);
    }

    .video-table {
      width: 100%;
      border-collapse: collapse;
    }

    .video-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }

    .video-row:hover { background: rgba(255,255,255,0.03); }

    .video-row td { padding: 12px 8px; vertical-align: middle; }

    .thumb-preview {
      width: 80px;
      aspect-ratio: 16/9;
      border-radius: 6px;
      object-fit: cover;
      background: #000;
    }

    .video-info b { display: block; font-size: 14px; margin-bottom: 2px; }
    .video-info span { color: rgba(255,255,255,0.5); font-size: 12px; }

    .del-btn {
      background: rgba(255, 78, 78, 0.1);
      color: var(--danger);
      border: 1px solid rgba(255, 78, 78, 0.2);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 0.2s;
    }

    .del-btn:hover {
      background: var(--danger);
      color: white;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      opacity: 0.8;
    }

    .user-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      background: #4285F4;
      margin-left: 5px;
    }

    .user-avatar-mini {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin-right: 8px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Скроллбар для длинных списков */
    .scroll-area {
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 5px;
    }

    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="header">
    <div>
      <a href="index.html" class="back-link">← Вернуться на сайт</a>
      <h1 style="margin: 5px 0 0 0; font-size: 24px;">Control Center</h1>
    </div>
    <div class="stats-card">
      <span id="totalCount">0</span> vids | <span id="userCount">0</span> users
    </div>
  </div>

  <div class="admin-grid">
    <div class="content-section">
      <div class="section-title">
        <span>🎬 Видеоролики</span>
      </div>
      <div class="scroll-area">
        <table class="video-table">
          <tbody id="adminList">
            </tbody>
        </table>
      </div>
    </div>

    <div class="content-section">
      <div class="section-title">
        <span>👥 Пользователи</span>
      </div>
      <div class="scroll-area">
        <table class="video-table">
          <tbody id="userList">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://videohub-c48i.onrender.com";
  const ADMIN_NICKNAME = "MrGarder"; 

  function checkAccess() {
    const currentUser = localStorage.getItem('currentUser') || localStorage.getItem('username');
    if (currentUser !== ADMIN_NICKNAME) {
      alert("Доступ запрещен!");
      location.href = 'index.html';
    } else {
      document.body.style.display = 'block';
    }
  }

  async function loadVideos() {
    try {
      const res = await fetch(`${API_URL}/videos`);
      const videos = await res.json();
      document.getElementById('totalCount').innerText = videos.length;
      const list = document.getElementById('adminList');
      
      list.innerHTML = videos.map(v => {
        const id = v._id || v.id;
        const thumbSrc = v.thumbnail_url?.startsWith('http') ? v.thumbnail_url : `${API_URL}${v.thumbnail_url}`;
        
        return `
          <tr class="video-row">
            <td width="90"><img src="${thumbSrc}" class="thumb-preview" onerror="this.src='https://via.placeholder.com/160x90/111/444?text=No+Thumb'"></td>
            <td class="video-info">
              <b>${v.title}</b>
              <span>@${v.author_name}</span>
            </td>
            <td align="right">
              <button class="del-btn" onclick="deleteVideo('${id}')">Удалить</button>
            </td>
          </tr>
        `;
      }).join('');
    } catch (err) { console.error(err); }
  }

  async function loadUsers() {
    try {
      const res = await fetch(`${API_URL}/admin/users`);
      const users = await res.json();
      document.getElementById('userCount').innerText = users.length;
      const list = document.getElementById('userList');
      
      list.innerHTML = users.map(u => `
        <tr class="video-row">
          <td class="video-info">
            <div style="display:flex; align-items:center;">
              <img src="${u.avatar_url || 'https://via.placeholder.com/32'}" class="user-avatar-mini">
              <div>
                <b>${u.username} ${u.googleId ? '<span class="user-badge">G</span>' : ''}</b>
                <span>${u.email || 'no-mail'}</span>
              </div>
            </div>
          </td>
          <td align="right">
            ${u.username !== ADMIN_NICKNAME ? `<button class="del-btn" onclick="deleteUser('${u._id}')">Бан</button>` : '⭐'}
          </td>
        </tr>
      `).join('');
    } catch (err) { console.error(err); }
  }

  async function deleteVideo(id) {
    if (!confirm("Удалить видео?")) return;
    const myName = localStorage.getItem('currentUser') || localStorage.getItem('username');
    const res = await fetch(`${API_URL}/admin/delete-video/${id}?username=${myName}`, { method: 'DELETE' });
    if (res.ok) loadVideos();
  }

  async function deleteUser(id) {
    if (!confirm("Забанить пользователя?")) return;
    const res = await fetch(`${API_URL}/admin/delete-user/${id}`, { method: 'DELETE' });
    if (res.ok) loadUsers();
  }

  checkAccess();
  loadVideos();
  loadUsers();
</script>

</body>
</html>
