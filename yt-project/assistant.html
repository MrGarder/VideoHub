<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VideoHub AI — Nexus Control</title>
    <style>
        :root {
            --bg: #05050a;
            --accent: #6b5cff;
            --cyan: #00f2ff;
            --pink: #ff00d4;
            --red: #ff3333;
            --text: #fff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; transition: background 0.8s, filter 0.3s;
        }

        /* Анимированная сетка */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(107, 92, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(107, 92, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
            perspective: 1000px;
        }

        .status-card {
            background: var(--glass); padding: 40px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            text-align: center; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            max-width: 500px; width: 90%; position: relative;
            transform-style: preserve-3d;
        }

        /* Визуализатор "голоса" */
        .bars {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 4px; height: 30px; margin-bottom: 20px;
        }
        .bar { width: 4px; background: var(--cyan); border-radius: 2px; transition: 0.2s; height: 5px; }
        .active .bar { animation: bar-dance 0.5s infinite alternate; }
        @keyframes bar-dance { 
            from { height: 5px; } 
            to { height: 30px; box-shadow: 0 0 10px var(--cyan); } 
        }

        .mic-sphere {
            width: 140px; height: 140px;
            background: radial-gradient(circle, var(--accent), #2015a3);
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(107, 92, 255, 0.3); position: relative;
        }

        .mic-sphere.active {
            transform: scale(1.1) rotate(360deg);
            box-shadow: 0 0 60px var(--cyan), inset 0 0 20px rgba(255,255,255,0.5);
        }

        .pulse {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--cyan); opacity: 0;
        }
        .active .pulse { animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .log-box {
            background: rgba(0, 0, 0, 0.6); border-radius: 12px;
            padding: 15px; font-family: 'Monaco', monospace;
            font-size: 13px; color: var(--cyan); margin-top: 15px;
            border-left: 3px solid var(--accent); text-align: left;
            min-height: 40px; overflow: hidden;
        }

        .cmd-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 25px;
        }
        .cmd-item {
            font-size: 9px; padding: 6px; background: rgba(255,255,255,0.05);
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); color: #888;
        }

        /* Спец-режимы */
        body.warning { background: #300505; }
        body.matrix { background: #000; filter: hue-rotate(90deg) brightness(1.2); }
        body.matrix .grid-bg { background-size: 20px 80px; }

        .back-link { margin-top: 25px; color: var(--text); text-decoration: none; opacity: 0.4; font-size: 14px; }
        .back-link:hover { opacity: 1; text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body id="mainBody">

<div class="grid-bg"></div>

<div class="status-card" id="card">
    <div class="bars" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="mic-sphere" id="mainMic">
        <span id="micIcon">📡</span>
        <div class="pulse"></div>
    </div>
    
    <h1 id="statusText">System Online</h1>
    <div style="font-size: 12px; color: var(--cyan); margin-bottom: 10px;" id="subStatus">Ready for voice input</div>

    <div class="log-box" id="transcript">Waiting...</div>

    <div class="cmd-grid">
        <div class="cmd-item">🕒 Время</div>
        <div class="cmd-item">🎭 Шутка</div>
        <div class="cmd-item">🧪 Статус</div>
        <div class="cmd-item">💻 Матрица</div>
        <div class="cmd-item">⛅ Погода</div>
        <div class="cmd-item">🧨 Удалить</div>
    </div>
</div>

<a href="index.html" class="back-link">TERMINATE SESSION</a>

<script>
    const mic = document.getElementById('mainMic');
    const statusText = document.getElementById('statusText');
    const transcriptBox = document.getElementById('transcript');
    const body = document.getElementById('mainBody');
    const visualizer = document.getElementById('visualizer');
    
    let isWaitingForConfirm = false;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        msg.pitch = 0.9; // Слегка басистый голос робота
        msg.rate = 1.1;
        window.speechSynthesis.speak(msg);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;

        window.onload = () => {
            speak("Система Видео Хаб активирована. Проверка протоколов завершена.");
            recognition.start();
        };

        recognition.onstart = () => {
            mic.classList.add('active');
            visualizer.classList.add('active');
        };

        recognition.onresult = (event) => {
            const cmd = event.results[event.results.length - 1][0].transcript.toLowerCase();
            transcriptBox.innerHTML = `<span style="color:var(--pink)">></span> ` + cmd;
            handleCommand(cmd);
        };

        function handleCommand(cmd) {
            // 1. Погода (Рандомная генерация)
            if (cmd.includes("погода") || cmd.includes("градус")) {
                const temps = [22, 18, 25, 30, 15];
                const conditions = ["солнечно", "облачно", "дождливо", "ясно"];
                speak(`Анализ атмосферы завершен. Сейчас ${temps[Math.floor(Math.random()*temps.length)]} градусов, ${conditions[Math.floor(Math.random()*conditions.length)]}.`);
                return;
            }

            // 2. Время и Дата
            if (cmd.includes("время") || cmd.includes("час")) {
                const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
                speak(`Текущее системное время: ${time}`);
                return;
            }

            // 3. Шутки
            if (cmd.includes("шутка") || cmd.includes("анекдот")) {
                const jokes = [
                    "Почему Java-программисты носят очки? Потому что они не видят Sharp.",
                    "Купил программист батон, а он 404.",
                    "Сколько программистов нужно, чтобы закрутить лампочку? Ни одного, это аппаратная проблема."
                ];
                speak(jokes[Math.floor(Math.random()*jokes.length)]);
                return;
            }

            // 4. Режимы интерфейса
            if (cmd.includes("матрица") || cmd.includes("хакер")) {
                speak("Входим в терминал Матрицы.");
                body.className = 'matrix';
                return;
            }
            if (cmd.includes("обычный") || cmd.includes("стандарт")) {
                speak("Возврат к стандартным протоколам.");
                body.className = '';
                return;
            }

            // 5. Управление плеером (Симуляция)
            if (cmd.includes("пауза") || cmd.includes("стоп")) {
                speak("Медиапоток приостановлен.");
                return;
            }
            if (cmd.includes("громче")) {
                speak("Уровень громкости увеличен на 20 процентов.");
                return;
            }

            // 6. Самоуничтожение (Прикол)
            if (cmd.includes("самоуничтожение")) {
                speak("Протокол самоуничтожения активирован. Десять. Девять. Восемь... Шучу. Я слишком ценный экземпляр.");
                body.classList.add('warning');
                setTimeout(() => body.classList.remove('warning'), 3000);
                return;
            }

            // 7. Навигация
            if (cmd.includes("домой") || cmd.includes("главная")) {
                speak("Перенаправляю на главный узел.");
                setTimeout(() => location.href = 'index.html', 1500);
            }
            else if (cmd.includes("найди")) {
                const q = cmd.split("найди")[1];
                speak(`Инициирую поиск: ${q}`);
                setTimeout(() => location.href = `index.html?search=${encodeURIComponent(q)}`, 1500);
            }

            // 8. Удаление истории
            if (cmd.includes("очисти историю")) {
                isWaitingForConfirm = true;
                body.classList.add('warning');
                speak("Требуется подтверждение для удаления базы данных истории. Скажите: Да, подтверждаю.");
            }
            else if (isWaitingForConfirm && cmd.includes("да")) {
                speak("База данных очищена. Следы стерты.");
                body.classList.remove('warning');
                isWaitingForConfirm = false;
            }
        }

        recognition.onend = () => recognition.start();
    }
</script>

</body>
</html>
