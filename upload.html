<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление контента — VideoHub</title>
    <style>
        :root {
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --bg: #11111a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.25);
        }

        body { 
            background: linear-gradient(135deg, #0f0f1a 0%, #1b1630 100%);
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: var(--accent); filter: blur(150px);
            top: -100px; right: -50px; opacity: 0.15; z-index: -1;
        }

        .upload-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 28px; 
            width: 100%;
            max-width: 480px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-mini {
            text-align: center; margin-bottom: 10px; font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-mini span { color: #8b5cf6; -webkit-text-fill-color: #8b5cf6; }

        h2 { margin-bottom: 30px; font-size: 24px; font-weight: 700; text-align: center; letter-spacing: -0.5px; }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.01);
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.06);
            transform: scale(1.01);
        }
        .drop-zone p { margin: 8px 0 0; font-size: 14px; opacity: 0.7; font-weight: 500; }
        .drop-zone .icon { font-size: 34px; display: block; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); transition: 0.3s; }
        .drop-zone:hover .icon { transform: translateY(-5px); }

        .file-info { font-size: 13px; color: #a78bfa; margin-top: 10px; font-weight: 600; display: none; }

        input[type="text"], textarea { 
            width: 100%; padding: 16px; margin-bottom: 15px; 
            border-radius: 14px; border: 1px solid var(--border); 
            background: var(--input-bg); color: white; 
            box-sizing: border-box; outline: none; transition: 0.3s;
            font-size: 15px;
        }
        input:focus, textarea:focus { 
            border-color: var(--accent); 
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        input[type="file"] { display: none; }

        button { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; 
            background: linear-gradient(135deg, #6b5cff, #8b5cf6); 
            color: white; font-weight: 700; cursor: pointer; 
            margin-top: 10px; transition: 0.3s; font-size: 16px;
            box-shadow: 0 10px 25px rgba(107, 92, 255, 0.2);
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 35px rgba(107, 92, 255, 0.4);
            filter: brightness(1.1);
        }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .progress-container {
            width: 100%; background: rgba(255,255,255,0.05); 
            height: 8px; border-radius: 10px; margin-top: 25px; display: none;
            overflow: hidden; position: relative;
        }
        .progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #6b5cff, #8b5cf6);
            box-shadow: 0 0 15px var(--accent); transition: width 0.4s ease;
            position: relative;
        }
        .progress-bar::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 1.5s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .back-link { 
            display: block; text-align: center; margin-top: 25px; 
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; 
            transition: 0.3s;
        }
        .back-link:hover { color: #a78bfa; }

        ::placeholder { color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div class="upload-card">
    <div class="logo-mini">Video<span>Hub</span></div>
    <h2>Загрузка видео</h2>
    
    <div class="drop-zone" onclick="document.getElementById('videoFile').click()" id="videoDrop">
        <span class="icon">📁</span>
        <p id="videoLabel">Выберите видеофайл для загрузки</p>
        <div class="file-info" id="videoName"></div>
    </div>
    <input type="file" id="videoFile" accept="video/*">

    <div class="drop-zone" onclick="document.getElementById('thumbFile').click()" id="thumbDrop" style="padding: 20px;">
        <span class="icon" style="font-size: 24px;">🖼</span>
        <p id="thumbLabel" style="font-size: 13px;">Загрузить изображение обложки <b>(Не Обязательно)</b></p>
        <div class="file-info" id="thumbName"></div>
    </div>
    <input type="file" id="thumbFile" accept="image/*">

    <input type="text" id="title" placeholder="Введите название видео">
    <textarea id="desc" placeholder="Введите описание видеоролика" rows="3"></textarea>

    <button id="uploadBtn">Опубликовать</button>

    <div class="progress-container" id="progressCont">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <p id="status" style="text-align:center; font-size:14px; margin-top:15px; color: rgba(255,255,255,0.6);"></p>
    
    <a href="index.html" class="back-link">← Вернуться на главную</a>
</div>

<script>
    const API_URL = "https://videohub-c48i.onrender.com";
    const videoInput = document.getElementById('videoFile');
    const thumbInput = document.getElementById('thumbFile');
    const uploadBtn = document.getElementById('uploadBtn');

    function handleFileSelect(input, labelId, infoId) {
        const file = input.files[0];
        if (file) {
            document.getElementById(labelId).innerText = "Файл успешно выбран";
            document.getElementById(infoId).style.display = "block";
            document.getElementById(infoId).innerText = file.name;
        }
    }

    videoInput.onchange = () => handleFileSelect(videoInput, 'videoLabel', 'videoName');
    thumbInput.onchange = () => handleFileSelect(thumbInput, 'thumbLabel', 'thumbName');

    [ {id:'videoDrop', input:'videoFile'}, {id:'thumbDrop', input:'thumbFile'} ].forEach(item => {
        const zone = document.getElementById(item.id);
        zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drag-over'); };
        zone.ondragleave = () => zone.classList.remove('drag-over');
        zone.ondrop = (e) => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) {
                document.getElementById(item.input).files = files;
                handleFileSelect(document.getElementById(item.input), item.input === 'videoFile' ? 'videoLabel' : 'thumbLabel', item.input === 'videoFile' ? 'videoName' : 'thumbName');
            }
        };
    });

    uploadBtn.onclick = async () => {
        const video = videoInput.files[0];
        const thumb = thumbInput.files[0];
        const title = document.getElementById('title').value.trim();
        const desc = document.getElementById('desc').value.trim();
        const user = localStorage.getItem('currentUser');

        if (!video || !title) {
            alert("Ошибка: Укажите название и выберите видеофайл.");
            return;
        }

        if (!user) {
            alert("Ошибка авторизации. Пожалуйста, войдите в систему.");
            return;
        }

        const formData = new FormData();
        formData.append('video', video);
        if(thumb) formData.append('thumbnail', thumb);
        formData.append('title', title);
        formData.append('description', desc);
        formData.append('username', user);

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Инициализация...";
        document.getElementById('progressCont').style.display = "block";
        const pBar = document.getElementById('progressBar');

        const xhr = new XMLHttpRequest();
        xhr.open('POST', `${API_URL}/upload`, true);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                uploadBtn.innerText = "Загрузка данных...";
                const percent = (e.loaded / e.total) * 100;
                pBar.style.width = percent + '%';
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200 || xhr.status === 201) {
                uploadBtn.innerText = "Завершено";
                setTimeout(() => { location.href = 'index.html'; }, 1000);
            } else {
                alert("Ошибка выполнения операции: " + xhr.responseText);
                resetBtn();
            }
        };

        xhr.onerror = () => {
            alert("Ошибка сети. Проверьте подключение к серверу.");
            resetBtn();
        };

        xhr.send(formData);
    };

    function resetBtn() {
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Опубликовать";
        document.getElementById('progressCont').style.display = "none";
        document.getElementById('progressBar').style.width = "0%";
    }
</script>

</body>
</html>
